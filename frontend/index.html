<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>(function(){try{var t=localStorage.getItem('aimp_theme')||((window.matchMedia&&matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark');document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
<title>Dashboard — AI Engineer Mastery</title>
<link rel="stylesheet" href="assets/base.css">
<link rel="stylesheet" href="assets/app.css">
</head>
<body>
<div class="wrap wrap-wide" id="app" style="padding-top:8px">
  <div class="muted-center" id="loading"><span class="spinner"></span> Loading your dashboard…</div>
</div>

<script src="assets/api.js"></script>
<script>
if (!requireAuth()) { /* redirected */ }
renderNav("dash");

let CURRICULUM = [];
let LONGEST = 0;

async function load() {
  let user, curriculum, progress, stats;
  try {
    [user, curriculum, progress, stats] = await Promise.all([
      me(), getCurriculum(), getProgress(), getReviewStats(),
    ]);
  } catch (e) {
    document.getElementById("loading").innerHTML = "Could not load: " + escapeHtml(e.message);
    return;
  }

  CURRICULUM = curriculum;
  LONGEST = user.longest_streak;
  const doneDays = new Set(progress.completed_days);
  const allLessons = curriculum.flatMap((m) => m.lessons).sort((a, b) => a.day - b.day);
  const next = allLessons.find((l) => !doneDays.has(l.day)) || allLessons[allLessons.length - 1];
  const caughtUp = doneDays.has(next.day);

  const html = `
    <div class="hero" style="padding:30px 0 6px">
      <div class="eyebrow">Welcome back, ${escapeHtml(user.display_name)}</div>
      <h1 style="font-size:2rem">Today's training</h1>
    </div>

    <div class="today">
      <div style="flex:1; min-width:240px">
        <div class="big">Day ${next.day} ${caughtUp ? "· all caught up" : "· up next"}</div>
        <h2>${escapeHtml(next.title)}</h2>
        <p class="muted" style="margin:0">${next.est_minutes} min</p>
      </div>
      <a class="btn primary" href="lesson.html?day=${next.day}">${caughtUp ? "Revisit" : "Start"} Day ${next.day} &rarr;</a>
      ${stats.due_now > 0 ? `<a class="btn" href="review.html">Review ${stats.due_now} due card${stats.due_now > 1 ? "s" : ""}</a>` : ""}
    </div>

    <div class="stat-grid">
      <div class="stat"><div class="num gold" id="statPct">${progress.pct}%</div><div class="label" id="statPctLabel">${progress.completed_days.length}/${progress.total} lessons</div></div>
      <div class="stat" title="Consecutive days studied (complete a lesson or review cards to keep it alive). Several lessons in one day still count as one day."><div class="num" id="statStreak">${user.current_streak} &#128293;</div><div class="label" id="statStreakLabel">day streak (best ${user.longest_streak})</div></div>
      <div class="stat"><div class="num">${stats.due_now}</div><div class="label">cards due now</div></div>
      <div class="stat"><div class="num">${stats.reviewed_today}</div><div class="label">reviewed today</div></div>
    </div>

    <div class="progress-wrap panel" style="max-width:680px">
      <div class="progress-track"><div class="progress-fill" id="progFill" style="width:${progress.pct}%"></div></div>
      <div class="progress-label" id="progLabel"><b>${progress.completed_days.length}</b> of ${progress.total} days complete &middot; <b>${progress.pct}%</b></div>
    </div>

    <h2 style="margin-bottom:4px">The path</h2>
    <p class="muted" style="margin:0 0 10px; font-size:14px">${progress.total} lessons across ${curriculum.length} modules &middot; tap a module to expand.</p>
    <div id="modules"></div>`;
  document.getElementById("app").innerHTML = html;

  const mods = curriculum
    .map((m) => {
      const total = m.lessons.length;
      const doneN = m.lessons.filter((l) => doneDays.has(l.day)).length;
      const hasNext = m.lessons.some((l) => l.day === next.day);
      const days = m.lessons
        .map(
          (l) =>
            `<li class="day ${doneDays.has(l.day) ? "done" : ""}">
               <input type="checkbox" ${doneDays.has(l.day) ? "checked" : ""} onclick="toggle(event, ${l.id}, ${l.day})">
               <span class="dnum">Day ${l.day}</span>
               <a href="lesson.html?day=${l.day}">${escapeHtml(l.title)}</a>
               <span class="dtag">${l.est_minutes} min</span>
             </li>`
        )
        .join("");
      return `<div class="module ${hasNext ? "" : "collapsed"}">
          <header onclick="this.closest('.module').classList.toggle('collapsed')">
            <span class="mnum">${String(m.number).padStart(2, "0")}</span>
            <span class="mtitle">${escapeHtml(m.title)}</span>
            <span class="mweek">${escapeHtml(m.week)}</span>
            <span class="mcount ${doneN === total ? "complete" : ""}" id="mcount-${m.id}">${doneN}/${total}</span>
            ${m.is_core ? '<span class="mcore">core</span>' : ""}
            <span class="chev">&#9656;</span>
          </header>
          <ul class="days">${days}</ul>
        </div>`;
    })
    .join("");
  document.getElementById("modules").innerHTML = mods;
}

// Update the headline stats from a fresh progress payload (so completing a
// lesson visibly moves the streak, %, progress bar, and module counters).
function updateDashboard(p) {
  const doneSet = new Set(p.completed_days);
  LONGEST = Math.max(LONGEST, p.current_streak);
  const set = (id, html) => { const el = document.getElementById(id); if (el) el.innerHTML = html; };
  set("statPct", p.pct + "%");
  set("statPctLabel", `${p.completed_days.length}/${p.total} lessons`);
  set("statStreak", `${p.current_streak} &#128293;`);
  set("statStreakLabel", `day streak (best ${LONGEST})`);
  const fill = document.getElementById("progFill");
  if (fill) fill.style.width = p.pct + "%";
  set("progLabel", `<b>${p.completed_days.length}</b> of ${p.total} days complete &middot; <b>${p.pct}%</b>`);
  CURRICULUM.forEach((m) => {
    const total = m.lessons.length;
    const doneN = m.lessons.filter((l) => doneSet.has(l.day)).length;
    const chip = document.getElementById("mcount-" + m.id);
    if (chip) { chip.textContent = `${doneN}/${total}`; chip.classList.toggle("complete", doneN === total); }
  });
}

async function toggle(e, lessonId, day) {
  const checked = e.target.checked;
  e.target.closest(".day").classList.toggle("done", checked);
  try {
    const p = await setProgress(lessonId, checked);
    updateDashboard(p);
    if (checked) toast("Day " + day + " complete · streak " + p.current_streak);
  } catch (ex) {
    toast("Could not save: " + ex.message);
    e.target.checked = !checked;
    e.target.closest(".day").classList.toggle("done", !checked);
  }
}

load();
</script>
</body>
</html>
