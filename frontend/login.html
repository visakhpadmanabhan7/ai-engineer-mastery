<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>(function(){try{var t=localStorage.getItem('aimp_theme')||((window.matchMedia&&matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark');document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
<title>Sign in — AI Engineer Mastery</title>
<link rel="stylesheet" href="assets/base.css">
<link rel="stylesheet" href="assets/app.css">
</head>
<body>
<div class="auth-wrap">
  <div class="login-card">
    <span class="brand" style="font-size:1.1rem"><span class="dot"></span> AI Engineer Mastery</span>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle light/dark theme" style="position:absolute; top:18px; right:18px">☀️</button>
    <h1 id="title">Welcome back</h1>
    <p class="muted" style="font-size:14px; margin-top:0">Your daily AI-engineering &amp; system-design trainer.</p>

    <div class="auth-tabs">
      <button id="tabLogin" class="active" onclick="mode('login')">Sign in</button>
      <button id="tabReg" onclick="mode('register')">Create account</button>
    </div>

    <form id="form" onsubmit="submitForm(event)">
      <div class="field" id="nameField" style="display:none">
        <label>Name</label>
        <input id="name" type="text" value="Visakh" autocomplete="name">
      </div>
      <div class="field">
        <label>Email</label>
        <input id="email" type="email" value="visakh@local" autocomplete="email" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input id="password" type="password" value="learn" autocomplete="current-password" required>
      </div>
      <div class="err" id="err"></div>
      <button class="btn primary" type="submit" id="submitBtn" style="width:100%; justify-content:center; margin-top:6px">Sign in</button>
    </form>
    <p class="muted" style="font-size:12.5px; margin-top:16px">The local dev account is pre-filled (<code>visakh@local</code> / <code>learn</code>) and works out of the box on a local setup. On a hosted instance, switch to <b>Register</b> to create your account.</p>
  </div>
</div>

<script src="assets/api.js"></script>
<script>
let current = "login";
if (getToken()) location.href = "index.html";

function mode(m) {
  current = m;
  document.getElementById("tabLogin").classList.toggle("active", m === "login");
  document.getElementById("tabReg").classList.toggle("active", m === "register");
  document.getElementById("nameField").style.display = m === "register" ? "block" : "none";
  document.getElementById("title").textContent = m === "register" ? "Create your account" : "Welcome back";
  document.getElementById("submitBtn").textContent = m === "register" ? "Create account" : "Sign in";
  document.getElementById("password").setAttribute("autocomplete", m === "register" ? "new-password" : "current-password");
}

async function submitForm(e) {
  e.preventDefault();
  const err = document.getElementById("err");
  const btn = document.getElementById("submitBtn");
  err.textContent = "";
  btn.disabled = true;
  const email = document.getElementById("email").value.trim();
  const pw = document.getElementById("password").value;
  try {
    if (current === "register") {
      await register(email, pw, document.getElementById("name").value.trim() || "Learner");
    } else {
      await login(email, pw);
    }
    location.href = "index.html";
  } catch (ex) {
    err.textContent = ex.message || "Something went wrong";
    btn.disabled = false;
  }
}
</script>
</body>
</html>
